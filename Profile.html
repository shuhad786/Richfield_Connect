<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="stylesheet.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto+Slab:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <title>Profile Page</title>
</head>
<body>
  <div class="profile-container">
    <nav class="profile-nav">
      <div class="nav-content">
        <h2 class="nav-logo">Richfield Connect</h2>
        <div class="nav-links">
          <a href="Feed.html">Feed</a>
          <a href="Profile.html" class="active">Profile</a>
          <a href="index.html" class="logout-btn">Logout</a>
        </div>
      </div>
    </nav>

    <div class="profile-card">
      <div class="profile-header">
        <div class="profile-avatar">
          <span id="avatarInitials"></span>
        </div>
        <div class="profile-info">
          <h1 id="profileFullName"></h1>
          <p id="profileStudentNumber" class="student-id"></p>
        </div>
        <a href="index.html" class="edit-profile-btn">Logout</a>
      </div>

      <div class="profile-details">
        <div class="detail-section">
          <h3>Contact Information</h3>
          <div class="detail-item">
            <span class="label">Email:</span>
            <span id="profileEmail" class="value"></span>
          </div>
          <div class="detail-item">
            <span class="label">Campus / DL:</span>
            <span id="profileCampus" class="value"></span>
          </div>
        </div>

        <div class="detail-section">
          <h3>About</h3>
          <div class="detail-item">
            <span class="label">Bio:</span>
            <p id="profileBio" class="value bio-text"></p>
          </div>
        </div>

        <div class="detail-section">
          <h3>Interests</h3>
          <div id="profileInterests" class="interests-display"></div>
        </div>

        <div class="detail-section">
          <button type="button" class="clear-data-btn" id="clearDataBtn">Clear All Data</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="jquery.js"></script>
</body>
</html>
